<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100マスぐらい計算　生成ツール</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --primary-color: #4a6fa5;
            --header-bg: #e9ecef;
            --border-color: #dee2e6;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 1150px;
            width: 100%;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .history {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 20px;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
        }
        
        /* ==========================================
           操作パネルのスタイル
        ========================================== */
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
        }

        .input-field {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-field {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
            color: #495057;
            font-size: 14px;
        }

        .checkbox-field input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            color: #495057;
        }

        input[type="number"], select {
            padding: 8px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
            background: white;
        }

        input[type="number"] {
            width: 80px;
        }

        select {
            cursor: pointer;
            font-weight: bold;
        }

        /* 印刷ボタンのスタイル */
        .btn-print {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .btn-print:hover {
            background-color: #218838;
        }

        .error-message {
            color: #e63946;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        /* ==========================================
           テーブル
        ========================================== */
        .table-wrapper {
            overflow-x: auto;
            max-width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
            font-size: 14px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px 4px;
            text-align: center;
            min-width: 65px;
            vertical-align: middle;
        }

        th {
            background-color: var(--header-bg);
            font-weight: bold;
            color: #495057;
        }

        .axis-header {
            background-color: #dbe5f1;
            font-weight: bold;
            color: var(--primary-color);
        }

        .corner-header {
            background-color: var(--primary-color);
            color: white;
            font-size: 18px;
        }

        .result-cell {
            background-color: #fff;
            color: #333;
        }

        .result-cell.hidden-mode {
            background-color: #fafafa;
        }

        /* 三択クイズ用のスタイル */
        .quiz-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }

        .quiz-option {
            width: 100%;
            max-width: 70px;
            padding: 3px 2px;
            font-size: 12px;
            background-color: #f8f9fa;
            border: 1px solid #ced4da;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.1s ease;
            text-align: center;
        }

        .quiz-option:hover {
            background-color: #e2e6ea;
            border-color: #adb5bd;
        }

        .quiz-option.correct-choice {
            background-color: #28a745 !important;
            color: white !important;
            border-color: #28a745 !important;
            font-weight: bold;
        }

        .quiz-option.wrong-choice {
            background-color: #dc3545 !important;
            color: white !important;
            border-color: #dc3545 !important;
            text-decoration: line-through;
        }

        tr:hover td.axis-header {
            background-color: #cbdcf0;
        }

        /* ==========================================
           印刷用スタイル（A4・セル正方形）
        ========================================== */
        @media print {
            @page {
                size: A4 landscape; /* 横向き固定 */
                margin: 6mm 10mm;   /* 余白 */
            }

            html, body {
                background-color: #fff;
                padding: 0;
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden; /* 2枚目の白紙出力を防止 */
            }

            .container {
                box-shadow: none;
                padding: 0;
                margin: 0;
                max-width: 100%;
                width: 100%;
            }

            /* 印刷 タイトルなし */
            h1 {
                display: none !important;
            }

            /* 印刷 上部メニューなし */
            .input-group {
                display: none !important;
            }

            .table-wrapper {
                border: none;
                overflow: visible;
                width: 100%;
            }

            table {
                width: auto;        /* テーブル全体の幅自動 */
                margin: 0 auto; /* 中央寄せ */
                table-layout: fixed;
                page-break-inside: avoid;
                page-break-after: avoid;
                font-size: 11pt;
            }

            th, td {
                border: 1px solid #000 !important;
                word-break: keep-all;
                overflow: hidden;
                box-sizing: border-box;
            }

            /* ヘッダーとサイドバーの設定 */
            th, .axis-header, .corner-header {
                background-color: #e9ecef !important;
                -webkit-print-color-adjust: exact !important;
                color: black;
                print-color-adjust: exact !important;
                padding: 4px 1px !important;
            }

            /* 結果表示（入力）セルを正方形にする設定 */
            .result-cell {
                width: 45px !important;
                height: 45px !important;
                aspect-ratio: 1 / 1 !important; /* アスペクト比を1:1固定 */
                padding: 0 !important;          /* 内側余白をリセット */
                vertical-align: middle !important;
            }

            /* 結果を「隠す」にした白いセルの高さ調整を上書き */
            td.result-cell.hidden-mode {
                padding-top: 0 !important;
                padding-bottom: 0 !important;
            }

            /* 三択クイズの印刷レイアウト */
            .quiz-container {
                display: flex;
                flex-direction: column;
                gap: 1px;
                align-items: center;
                justify-content: center;
                height: 100%;
                width: 100%;
            }

            .quiz-option {
                border: none !important;
                background: none !important;
                color: #000 !important;
                text-align: center;
                padding: 0;
                font-size: 8.5pt; /* A4正方形対応の限界値 */
                max-width: 100%;
                width: 100%;
                display: block;
                line-height: 1.1;
            }
            
            .quiz-option::before {
                display: none !important;
                content: "" !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>100マスぐらい計算　生成ツール</h1>
    <div class="input-group">
    最大15×15(超える場合はランダム)<br>マイナス値対応
    </div>
    <div class="input-group">
        <div class="input-field">
            <label for="start-val">開始:</label>
            <input type="number" id="start-val" value="1">
        </div>
        <div class="input-field">
            <label for="end-val">終了:</label>
            <input type="number" id="end-val" value="9">
        </div>
        <div class="input-field">
            <label for="operator">計算:</label>
            <select id="operator">
                <option value="multiply">× （掛け算）</option>
                <option value="add">＋ （足し算）</option>
                <option value="subtract">ー （引き算）</option>
            </select>
        </div>
        <div class="input-field">
            <label for="display-mode">答え:</label>
            <select id="display-mode">
                <option value="hide" selected>隠す</option>
                <option value="show">表示</option>
                <option value="quiz">三択クイズ(ランダムver.)</option>
                <option value="quiz_easy">三択クイズ(近い数ver.)</option>
            </select>
        </div>
        <label class="checkbox-field">
            <input type="checkbox" id="random-mode" checked> 配置ランダム
        </label>

        <button class="btn-print" onclick="window.print()">
            🖨️ 印刷
        </button>
    </div>

    <div class="error-message" id="error-msg">※終了の値は開始の値以上にしてください。</div>

    <div class="table-wrapper">
        <table id="matrix-table">
            </table>
    </div>
    <br><br><br>
    <div class="history">
    2023/07/17　印刷時の文字色を黒・解答欄を正方形に変更<br>
    2023/07/17　三択のダミーを近い数ver.追加<br>
    </div>
</div>

<script>
    const startInput = document.getElementById('start-val');
    const endInput = document.getElementById('end-val');
    const operatorSelect = document.getElementById('operator');
    const displayModeSelect = document.getElementById('display-mode');
    const randomCheckbox = document.getElementById('random-mode');
    const matrixTable = document.getElementById('matrix-table');
    const errorMsg = document.getElementById('error-msg');

    let currentRowNumbers = [];
    let currentColNumbers = [];

    //三択をランダムに並び替え
    function shuffle(array) {
        const result = [...array];
        for (let i = result.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [result[i], result[j]] = [result[j], result[i]];
        }
        return result;
    }

    //三択を生成 ランダムver.
    function generateQuizOptions(correctAnswer) {
        let options = [correctAnswer];
        let range = correctAnswer === 0 ? 5 : Math.max(5, Math.abs(Math.floor(correctAnswer * 0.3)));

        while (options.length < 3) {
            let offset = Math.floor(Math.random() * (range * 2 + 1)) - range;
            if (offset !== 0) {
                let dummy = correctAnswer + offset;
                if (!options.includes(dummy)) {
                    options.push(dummy);
                }
            }
        }
        return shuffle(options);
    }

    //三択を生成 簡単ver.
    // ＋－は範囲が+-2
    // ×は+-2、2桁以上は下1桁が同じ
    function generateQuizOptions_easy(correctAnswer, opt) {
        let options = [correctAnswer];
        //正数に変換
        const absoluteValue = Math.abs(correctAnswer);
        // 正解の符号を判定 (1:プラスまたは0, -1:マイナス)
        const correctSign = correctAnswer >= 0 ? 1 : -1;
        //範囲設定用 +-2の範囲
        let offsets = [-2, -1, 1, 2];
        let dummy = [];
        
        //範囲追加
        if (opt === 'multiply') {
            if (absoluteValue >= 10 ) {
                // 【掛け算で2桁以上の場合】一の位を揃える範囲も追加
                offsets = [-2, -1, 1, 2, -20, -10, 10, 20];
            }
        }
        
        //候補からダミーを生成
        for (let offset of offsets) {
            const candidate = correctAnswer + offset;
            const candidateSign = candidate >= 0 ? 1 : -1;
            
            if (correctSign === candidateSign){
                //記号が同じならOK
                dummy.push(candidate)
            } else if (-4 < candidate && candidate < 4 ) {
                //0近辺の場合は可
                dummy.push(candidate)
            }
        }
        
        //ダミーが足りない場合
        while (dummy.length < 2) {
            const sample = correctAnswer + Math.floor( Math.random() * 5 ) + 2;
            if (!dummy.includes(sample)) {
                dummy.push(sample);
            }
        }
        
        //ダミーを2つに絞り込む
        dummy = shuffle(dummy);
        options.push(dummy[0]);
        options.push(dummy[1]);
        
        return shuffle(options);
    
    }

    //表の生成
    function updateNumbersAndRender() {
        const start = parseInt(startInput.value, 10);
        const end = parseInt(endInput.value, 10);
        const isRandom = randomCheckbox.checked;

        if (isNaN(start) || isNaN(end)) return;
        
        if (start > end) {
            errorMsg.textContent = "※終了の値は開始の値以上にしてください。";
            errorMsg.style.display = 'block';
            matrixTable.innerHTML = '';
            return;
        } else {
            errorMsg.style.display = 'none';
        }

        let fullPool = [];
        for (let k = start; k <= end; k++) {
            fullPool.push(k);
        }

        let selectedNumbers = [];
        if (fullPool.length > 15) {
            const shuffledPool = shuffle(fullPool);
            selectedNumbers = shuffledPool.slice(0, 15);
            if (!isRandom) {
                selectedNumbers.sort((a, b) => a - b);
            }
        } else {
            selectedNumbers = fullPool;
        }

        let rows = [...selectedNumbers];
        let cols = [...selectedNumbers];

        if (isRandom) {
            rows = shuffle(rows);
            cols = shuffle(cols);
        }

        currentRowNumbers = rows;
        currentColNumbers = cols;

        renderMatrix();
    }

    //テーブル作成
    function renderMatrix() {
        if (currentRowNumbers.length === 0 || currentColNumbers.length === 0) return;

        const op = operatorSelect.value;
        const mode = displayModeSelect.value;

        let opSymbol = '×';
        if (op === 'add') opSymbol = '＋';
        if (op === 'subtract') opSymbol = 'ー';

        let tableHtml = '';

        tableHtml += `<thead><tr><th class="corner-header">${opSymbol}</th>`;
        for (let j of currentColNumbers) {
            tableHtml += `<th class="axis-header">${j}</th>`;
        }
        tableHtml += '</tr></thead><tbody>';

        for (let i of currentRowNumbers) {
            tableHtml += '<tr>';
            tableHtml += `<td class="axis-header">${i}</td>`;
            
            for (let j of currentColNumbers) {
                let result = 0;
                if (op === 'multiply') result = i * j;
                if (op === 'add') result = i + j;
                if (op === 'subtract') result = i - j;

                if (mode === 'hide') {
                    tableHtml += `<td class="result-cell hidden-mode"></td>`;
                } else if (mode === 'show') {
                    tableHtml += `<td class="result-cell">${result}</td>`;
                } else if (mode === 'quiz') {
                    const choices = generateQuizOptions(result);
                    tableHtml += `<td class="result-cell">`;
                    tableHtml += `<div class="quiz-container">`;
                    choices.forEach(choice => {
                        tableHtml += `<div class="quiz-option" data-answer="${result}" data-value="${choice}" onclick="checkQuizChoice(this)">${choice}</div>`;
                    });
                    tableHtml += `</div>`;
                    tableHtml += `</td>`;
                } else if (mode === 'quiz_easy') {
                    const choices = generateQuizOptions_easy(result,op);
                    tableHtml += `<td class="result-cell">`;
                    tableHtml += `<div class="quiz-container">`;
                    choices.forEach(choice => {
                        tableHtml += `<div class="quiz-option" data-answer="${result}" data-value="${choice}" onclick="checkQuizChoice(this)">${choice}</div>`;
                    });
                    tableHtml += `</div>`;
                    tableHtml += `</td>`;
                }
            }
            tableHtml += '</tr>';
        }
        tableHtml += '</tbody>';

        matrixTable.innerHTML = tableHtml;
    }

    function checkQuizChoice(element) {
        const correctAnswer = parseInt(element.getAttribute('data-answer'), 10);
        const selectedValue = parseInt(element.getAttribute('data-value'), 10);
        
        if (selectedValue === correctAnswer) {
            element.classList.add('correct-choice');
        } else {
            element.classList.add('wrong-choice');
        }
    }

    startInput.addEventListener('input', updateNumbersAndRender);
    endInput.addEventListener('input', updateNumbersAndRender);
    randomCheckbox.addEventListener('change', updateNumbersAndRender);
    operatorSelect.addEventListener('change', renderMatrix);
    displayModeSelect.addEventListener('change', renderMatrix);

    updateNumbersAndRender();
</script>

</body>
</html>
